<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="hud">
        <h1>Snake <span class="version">v0.5.3</span></h1>
        <div class="hud-meta">
          <p class="score">Score: <span id="score">0</span></p>
          <p class="high-score">
            Best (AI <span id="best-ai-count">0</span>, <span id="best-difficulty">Medium</span>):
            <span id="high-score">0</span>
          </p>
          <p class="rogue-meta">AI: <span id="rogue-status">0/0</span></p>
        </div>
      </section>

      <section class="setup" aria-label="Pre-game setup">
        <label for="rogue-count">AI snakes</label>
        <select id="rogue-count" name="rogue-count">
          <option value="0">0</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
        <label for="difficulty">Difficulty</label>
        <select id="difficulty" name="difficulty">
          <option value="EASY">Easy</option>
          <option value="MEDIUM" selected>Medium</option>
          <option value="HARD">Hard</option>
          <option value="STORY">Story</option>
        </select>
        <button id="start-btn" type="button">Start Game</button>
      </section>

      <section class="board-wrap">
        <div
          id="board"
          class="board"
          role="application"
          aria-label="Snake game board"
        ></div>
      </section>

      <section class="status-wrap">
        <p id="status" class="status">Use arrows or WASD to move.</p>
      </section>

      <section class="actions" aria-label="Game actions">
        <button id="pause-btn" type="button">Pause</button>
        <button id="restart-btn" type="button">Restart</button>
        <button id="scores-toggle-btn" type="button" aria-pressed="false">
          Show Best Scores
        </button>
        <button
          id="controls-toggle-btn"
          type="button"
          aria-pressed="false"
        >
          Show On-Screen Controls
        </button>
      </section>

      <section
        id="scores-panel"
        class="scores-panel hidden"
        aria-label="Best scores"
      >
        <div class="scores-panel-head">
          <h2>Best Scores</h2>
          <label class="scores-filter" for="scores-difficulty">
            Difficulty
            <select id="scores-difficulty" name="scores-difficulty">
              <option value="STORY">Story</option>
              <option value="EASY">Easy</option>
              <option value="MEDIUM" selected>Medium</option>
              <option value="HARD">Hard</option>
            </select>
          </label>
        </div>
        <ul id="scores-list" class="scores-list"></ul>
      </section>

      <section class="controls" aria-label="Touch controls">
        <div class="controls-single">
          <button type="button" data-direction="UP">Up</button>
        </div>
        <div class="controls-row">
          <button type="button" data-direction="LEFT">Left</button>
          <button type="button" data-direction="RIGHT">Right</button>
        </div>
        <div class="controls-single">
          <button type="button" data-direction="DOWN">Down</button>
        </div>
      </section>
    </main>

    <section
      id="game-over-modal"
      class="modal hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
    >
      <div class="modal-card">
        <h2 id="modal-title">Game Over</h2>
        <p id="modal-message"></p>
        <p id="modal-score" class="modal-score"></p>
        <section class="setup modal-setup" aria-label="Game over setup">
          <label for="modal-rogue-count">AI snakes</label>
          <select id="modal-rogue-count" name="modal-rogue-count">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
          </select>
        </section>
        <section class="setup modal-setup" aria-label="Game over difficulty">
          <label for="modal-difficulty">Difficulty</label>
          <select id="modal-difficulty" name="modal-difficulty">
            <option value="EASY">Easy</option>
            <option value="MEDIUM" selected>Medium</option>
            <option value="HARD">Hard</option>
            <option value="STORY">Story</option>
          </select>
        </section>
        <button id="modal-restart-btn" type="button">Play Again</button>
      </div>
    </section>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
